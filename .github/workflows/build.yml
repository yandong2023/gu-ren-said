name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Next.js app
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Seed SQLite database
        run: pnpm db:seed

      - name: Main query relevance tests
        run: pnpm exec tsx scripts/evaluate-queries.ts

      - name: Negative query relevance tests
        run: pnpm exec tsx scripts/evaluate-negative-queries.ts

      - name: Business competition relevance test
        run: pnpm exec tsx scripts/evaluate-business-competition-query.ts

      - name: Classic corpus relevance tests
        run: pnpm exec tsx scripts/evaluate-classic-corpus.ts

      - name: Corpus coverage audit
        run: pnpm exec tsx scripts/audit-corpus.ts

      - name: Chengyu relevance tests
        run: pnpm exec tsx scripts/evaluate-chengyu-queries.ts

      - name: Build
        run: pnpm build
