name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --reporter=silent

      - name: Seed SQLite database
        run: pnpm db:seed >/dev/null

      - name: Run query regression tests
        shell: bash
        run: |
          set +e
          pnpm test:queries > query-tests.log 2>&1
          status=$?
          if [ $status -ne 0 ]; then
            cat query-tests.log
            exit $status
          fi
          tail -n 30 query-tests.log

      - name: Build
        shell: bash
        run: |
          set +e
          pnpm build > build.log 2>&1
          status=$?
          if [ $status -ne 0 ]; then
            echo "=== BUILD ERROR SUMMARY ==="
            grep -n -E "Type error|Failed to compile|Error:|error TS|Module not found|Cannot find|is not assignable" build.log || true
            echo "=== BUILD LOG TAIL ==="
            tail -n 120 build.log
            exit $status
          fi
          tail -n 40 build.log
