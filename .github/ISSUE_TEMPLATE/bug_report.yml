name: Bug report
description: Report a bug in search, UI, card export, database seeding, or deployment.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough details so we can reproduce it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: "Describe the bug clearly."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Search ...
        3. Click ...
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "What did you expect to happen?"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "macOS + Chrome / iPhone Safari / Node 22 / pnpm 9"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs, screenshots, or error messages if available.
      render: shell
    validations:
      required: false
