name: Feature request
description: Suggest a product feature, search improvement, card template, or data pipeline.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Please describe the user scenario and why it matters.

  - type: textarea
    id: problem
    attributes:
      label: Problem / user need
      placeholder: "What problem does this solve? Who needs it?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: "Describe the feature or behavior you want."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Search / ranking
        - Quote data
        - Slang mappings
        - Share card UI
        - Mobile experience
        - Database / sqlite-vec
        - Optional LLM enhancement
        - Deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "Any alternative designs, libraries, or workflows?"
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      placeholder: "Links, screenshots, examples, or references."
    validations:
      required: false
